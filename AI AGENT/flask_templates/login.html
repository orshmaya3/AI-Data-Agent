<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Orbital AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: rgba(240,240,250,0.85);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Subtle radial glow behind card */
    body::before {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(120,160,255,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-box {
      background: rgba(240,240,250,0.04);
      border: 1px solid rgba(240,240,250,0.10);
      border-radius: 8px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      position: relative;
    }

    /* Top accent line */
    .login-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(120,160,255,0.6), transparent);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .orbital-icon {
      width: 48px; height: 48px;
      margin: 0 auto 14px;
    }
    .orbital-icon svg { width: 48px; height: 48px; }
    .login-logo h1 {
      font-size: 17px;
      font-weight: 700;
      color: rgba(240,240,250,0.9);
      margin-bottom: 5px;
    }
    .login-logo p {
      font-size: 12px;
      color: rgba(240,240,250,0.35);
    }

    label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: rgba(240,240,250,0.4);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    .form-group { margin-bottom: 18px; }
    .form-control {
      width: 100%;
      background: rgba(240,240,250,0.04);
      border: 1px solid rgba(240,240,250,0.10);
      border-radius: 4px;
      color: rgba(240,240,250,0.85);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-control:focus {
      border-color: rgba(120,160,255,0.5);
      box-shadow: 0 0 0 3px rgba(120,160,255,0.08);
    }
    .form-control::placeholder { color: rgba(240,240,250,0.20); }

    .btn-login {
      width: 100%;
      background: #78a0ff;
      border: none;
      border-radius: 4px;
      color: #000;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 11px;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 6px;
      letter-spacing: 0.3px;
    }
    .btn-login:hover { opacity: 0.88; }
    .btn-login:active { opacity: 0.75; }

    .alert-error {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 4px;
      color: #f87171;
      font-size: 12px;
      padding: 9px 12px;
      margin-bottom: 18px;
    }

    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 10px;
      color: rgba(240,240,250,0.18);
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <div class="orbital-icon">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="16" stroke="rgba(120,160,255,0.35)" stroke-width="1.5"/>
          <ellipse cx="24" cy="24" rx="16" ry="7" stroke="rgba(120,160,255,0.18)" stroke-width="1.2"/>
          <circle cx="24" cy="8" r="3.5" fill="#78a0ff"/>
          <circle cx="24" cy="24" r="3" fill="rgba(120,160,255,0.25)"/>
        </svg>
      </div>
      <h1>Orbital AI</h1>
      <p>Data Agent Platform</p>
    </div>

    {% if error %}
    <div class="alert-error">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control"
               placeholder="Enter username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>

    <div class="login-footer">Powered by Claude · Retail Intelligence</div>
  </div>
</body>
</html>
