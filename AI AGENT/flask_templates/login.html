<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AI Data Department</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #0d1117;
      color: #f0f6fc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      position: relative;
      overflow: hidden;
    }
    .login-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, #1f6feb 0%, #8b5cf6 50%, #3fb950 100%);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo .icon {
      font-size: 36px;
      display: block;
      margin-bottom: 8px;
    }
    .login-logo h1 {
      font-size: 18px;
      font-weight: 700;
      color: #f0f6fc;
      margin: 0 0 4px 0;
    }
    .login-logo p {
      font-size: 12px;
      color: #8b949e;
      margin: 0;
    }
    label {
      color: #8b949e;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .form-control {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #f0f6fc;
      font-size: 14px;
      padding: 10px 14px;
    }
    .form-control:focus {
      background: #0d1117;
      border-color: #1f6feb;
      box-shadow: 0 0 0 3px rgba(31,111,235,0.15);
      color: #f0f6fc;
    }
    .form-control::placeholder { color: #484f58; }
    .btn-login {
      background: #1f6feb;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 10px;
      width: 100%;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #388bfd; }
    .alert-error {
      background: rgba(248,81,73,0.12);
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 8px;
      color: #f85149;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <span class="icon">📊</span>
      <h1>AI Data Department</h1>
      <p>Retail Intelligence Platform</p>
    </div>

    {% if error %}
    <div class="alert-error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="mb-3">
        <label for="username">USERNAME</label>
        <input type="text" id="username" name="username" class="form-control"
               placeholder="Enter username" autocomplete="username" required>
      </div>
      <div class="mb-4">
        <label for="password">PASSWORD</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login">Sign In →</button>
    </form>
  </div>
</body>
</html>
